<h2 class="text-2xl font-bold text-gray-800 mb-4">Cervejarias</h2>

<div
  class="grid max-w-full grid-cols-1 gap-4 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4"
  role="list"
>
  @for (b of breweries(); track $index) {
    <div
      class="bg-white rounded-lg shadow-md mb-4 hover:shadow-lg transition-shadow cursor-pointer"
      role="listitem"
    >
      <div class="w-full h-48 border-b border-gray-200 flex items-center justify-center">
        <img
          class="rounded-t-lg object-cover h-full w-full"
          src="https://placehold.co/600x400"
          alt=""
        />
      </div>
      <div class="p-6">
        <h3 class="text-xl font-bold text-gray-800">{{ b.name }}</h3>
        <p class="text-gray-600 mt-2">{{ b.address_1 }}</p>
      </div>
    </div>
  }
</div>
